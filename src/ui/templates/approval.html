{% extends "base.html" %}
{% block title %}Approval — Tower FDE Agent{% endblock %}
{% block content %}
<h2>Approve: {{ approval_type }}</h2>
<article>
    <header>{{ customer_name }} — {{ node_name }}</header>
    <div id="draft-content">
        {{ draft_content | safe }}
    </div>
    <footer>
        <form method="post" action="/approve/{{ thread_id }}">
            <div class="grid">
                <button type="submit" name="action" value="approve">Approve</button>
                <button type="submit" name="action" value="reject" class="secondary">Reject</button>
            </div>
            <label>
                Edits (optional)
                <textarea name="edits" placeholder="Revision instructions..."></textarea>
            </label>
            <button type="submit" name="action" value="edit" class="contrast">Request Edit</button>
        </form>
    </footer>
</article>
{% endblock %}
