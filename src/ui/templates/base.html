<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Tower FDE Agent{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <link rel="stylesheet" href="/static/styles.css">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body>
    <nav class="top-nav container">
        <ul>
            <li><a href="/" class="brand"><strong>⬡ Tower FDE</strong></a></li>
        </ul>
        <ul>
            <li><a href="/" class="{% if request.url.path == '/' %}active{% endif %}">Dashboard</a></li>
            <li><a href="/api/feedback-summary" class="{% if '/feedback' in request.url.path %}active{% endif %}">Feedback</a></li>
        </ul>
    </nav>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    <footer class="container">
        <small class="muted">Tower FDE Workflow Agent — Milestone 7</small>
    </footer>
    {% block scripts %}{% endblock %}
</body>
</html>
