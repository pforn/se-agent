<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Tower FDE Agent{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        .phase-badge {
            display: inline-block;
            padding: 0.2em 0.6em;
            border-radius: 4px;
            font-size: 0.85em;
            font-weight: 600;
        }
        .phase-discovery { background: #dbeafe; color: #1e40af; }
        .phase-poc { background: #fef3c7; color: #92400e; }
        .phase-proposal { background: #ede9fe; color: #5b21b6; }
        .phase-followup { background: #d1fae5; color: #065f46; }
        .phase-closed_won { background: #bbf7d0; color: #166534; }
        .phase-closed_lost { background: #fecaca; color: #991b1b; }
        .health-score { font-weight: 700; }
        .health-high { color: #16a34a; }
        .health-mid { color: #ca8a04; }
        .health-low { color: #dc2626; }
    </style>
</head>
<body>
    <main class="container">
        <nav>
            <ul><li><strong>Tower FDE Agent</strong></li></ul>
            <ul><li><a href="/">Dashboard</a></li></ul>
        </nav>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
